<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Modern Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#1f1f2e,#3b3b58);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.calculator{
width:330px;
background:#000;
padding:20px;
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.display{
height:80px;
background:#000;
color:rgb(63, 61, 61);
font-size:40px;
text-align:right;
border:none;
margin-bottom:20px;
}

button{
height:65px;
font-size:22px;
border-radius:50%;
border:none;
transition:0.2s;
}

button:active{
transform:scale(0.9);
}

.number{
background:#333;
color:white;
}

.operator{
background:#ff9500;
color:white;
}

.function{
background:#a5a5a5;
}

.zero{
border-radius:40px;
text-align:left;
padding-left:25px;
}

</style>

</head>
<body>

<div class="calculator">

<input type="text" id="display" class="form-control display" disabled>

<div class="row g-2">

<div class="col-3"><button class="btn function w-100" onclick="clearDisplay()">AC</button></div>
<div class="col-3"><button class="btn function w-100" onclick="deleteLast()">DEL</button></div>
<div class="col-3"><button class="btn function w-100" onclick="input('%')">%</button></div>
<div class="col-3"><button class="btn operator w-100" onclick="input('/')">÷</button></div>

<div class="col-3"><button class="btn number w-100" onclick="input('7')">7</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('8')">8</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('9')">9</button></div>
<div class="col-3"><button class="btn operator w-100" onclick="input('*')">×</button></div>

<div class="col-3"><button class="btn number w-100" onclick="input('4')">4</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('5')">5</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('6')">6</button></div>
<div class="col-3"><button class="btn operator w-100" onclick="input('-')">−</button></div>

<div class="col-3"><button class="btn number w-100" onclick="input('1')">1</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('2')">2</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('3')">3</button></div>
<div class="col-3"><button class="btn operator w-100" onclick="input('+')">+</button></div>

<div class="col-6"><button class="btn number w-100 zero" onclick="input('0')">0</button></div>
<div class="col-3"><button class="btn number w-100" onclick="input('.')">.</button></div>
<div class="col-3"><button class="btn operator w-100" onclick="calculate()">=</button></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
